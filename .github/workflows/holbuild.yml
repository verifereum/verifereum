name: holbuild

on:
  workflow_dispatch:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  HOLBUILD_REPO: https://github.com/charles-cooper/holbuild.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read holbuild pin
        id: holbuild-pin
        run: echo "holbuild-ref=$(tr -d '[:space:]' < PINS/holbuild.txt)" >> "$GITHUB_OUTPUT"

      - name: Clone pinned holbuild
        run: |
          git clone "$HOLBUILD_REPO" "$HOME/holbuild"
          cd "$HOME/holbuild"
          git checkout --detach "${{ steps.holbuild-pin.outputs.holbuild-ref }}"

      - name: Read HOL4 pin from holbuild
        id: hol4-pin
        run: echo "hol4-ref=$(tr -d '[:space:]' < $HOME/holbuild/PINS/hol.txt)" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/deps
        id: deps
        with:
          hol4-ref: ${{ steps.hol4-pin.outputs.hol4-ref }}

      - name: Configure holbuild cache
        run: echo "HOLBUILD_CACHE=$HOME/.cache/holbuild" >> "$GITHUB_ENV"

      - name: Restore holbuild action cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/holbuild
          key: holbuild-actions-${{ runner.os }}-${{ steps.deps.outputs.deps-hash }}-${{ github.sha }}
          restore-keys: |
            holbuild-actions-${{ runner.os }}-${{ steps.deps.outputs.deps-hash }}-
            holbuild-actions-${{ runner.os }}-

      - name: Build holbuild
        run: |
          cd "$HOME/holbuild"
          make HOLDIR="$HOLDIR"
          echo "$HOME/holbuild/bin" >> "$GITHUB_PATH"
      
      - name: Run holbuild
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          holbuild --holdir "$HOLDIR" -j"$(nproc)" build --skip-checkpoints --skip-goalfrag

      - name: Verify no successful-build checkpoints remain
        run: |
          if find .holbuild/checkpoints \( -name '*.save' -o -name '*.save.ok' \) 2>/dev/null | grep -q .; then
            echo "checkpoint files remained after holbuild run" >&2
            find .holbuild/checkpoints \( -name '*.save' -o -name '*.save.ok' \) 2>/dev/null | head -50 >&2
            exit 1
          fi
