name: holbuild

on:
  workflow_dispatch:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  HOLBUILD_REF: v0.6.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-polyml
        id: polyml

      - uses: ./.github/actions/setup-holbuild
        id: holbuild
        with:
          holbuild-ref: ${{ env.HOLBUILD_REF }}

      - name: Configure holbuild cache
        run: echo "HOLBUILD_CACHE=$HOME/.cache/holbuild" >> "$GITHUB_ENV"

      - name: Compute holbuild cache keys
        id: cache-key
        run: |
          base="holbuild-v2-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.holbuild.outputs.holbuild-rev }}-${{ steps.holbuild.outputs.hol-source-rev }}-${{ hashFiles('holproject.toml', 'holexamples.manifest.toml') }}"
          echo "toolchain-key=${base}-toolchain" >> "$GITHUB_OUTPUT"
          echo "build-key=${base}-build" >> "$GITHUB_OUTPUT"

      - name: Restore holbuild global cache
        id: cache-holbuild-global
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/holbuild
          key: ${{ steps.cache-key.outputs.build-key }}
          restore-keys: |
            ${{ steps.cache-key.outputs.toolchain-key }}
            holbuild-v2-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.holbuild.outputs.holbuild-rev }}-
            holbuild-v2-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-
            holbuild-v2-${{ runner.os }}-

      - name: Build schema-2 HOL toolchain
        run: holbuild buildhol

      - name: Save holbuild toolchain cache after buildhol
        if: steps.cache-holbuild-global.outputs.cache-primary-key != steps.cache-key.outputs.build-key
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: ~/.cache/holbuild
          key: ${{ steps.cache-key.outputs.toolchain-key }}

      - name: Build project with holbuild
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          holbuild --verbose -j"$(nproc)" build --skip-checkpoints --skip-proof-steps

      - name: Save holbuild global cache after build
        if: steps.cache-holbuild-global.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/holbuild
          key: ${{ steps.cache-key.outputs.build-key }}

      - name: Verify no successful-build checkpoints remain
        run: |
          if find .holbuild/checkpoints \( -name '*.save' -o -name '*.save.ok' \) 2>/dev/null | grep -q .; then
            echo "checkpoint files remained after holbuild run" >&2
            find .holbuild/checkpoints \( -name '*.save' -o -name '*.save.ok' \) 2>/dev/null | head -50 >&2
            exit 1
          fi
