name: holbuild

on:
  workflow_dispatch:
    inputs:
      holbuild-ref:
        description: "holbuild git ref to test"
        required: false
        default: "master"
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  HOLBUILD_REPO: https://github.com/charles-cooper/holbuild.git
  HOLBUILD_REF: ${{ inputs.holbuild-ref || 'master' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/deps
        id: deps

      - name: Configure holbuild cache
        run: echo "HOLBUILD_CACHE=$HOME/.cache/holbuild" >> "$GITHUB_ENV"

      - name: Restore holbuild action cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/holbuild
          key: holbuild-actions-${{ runner.os }}-${{ steps.deps.outputs.deps-hash }}-${{ github.sha }}
          restore-keys: |
            holbuild-actions-${{ runner.os }}-${{ steps.deps.outputs.deps-hash }}-
            holbuild-actions-${{ runner.os }}-

      - name: Build holbuild
        run: |
          git clone --depth 1 "$HOLBUILD_REPO" "$HOME/holbuild"
          cd "$HOME/holbuild"
          git fetch --depth 1 origin "$HOLBUILD_REF"
          git checkout --detach FETCH_HEAD
          make HOLDIR="$HOLDIR"
          echo "$HOME/holbuild/bin" >> "$GITHUB_PATH"

      - name: Write local holbuild overrides
        run: |
          cat > .holconfig.toml <<TOML
          [overrides.HOLKeccak]
          path = "$HOLDIR/examples/Crypto/Keccak"

          [overrides.HOLCryptoSHA2]
          path = "$HOLDIR/examples/Crypto/SHA-2"

          [overrides.HOLCryptoRIPEMD]
          path = "$HOLDIR/examples/Crypto/RIPEMD"

          [overrides.HOLCryptoMD]
          path = "$HOLDIR/examples/Crypto/MD"

          [overrides.HOLHoareTriple]
          path = "$HOLDIR/examples/machine-code/hoare-triple"

          [build]
          exclude = ["worktrees/*"]
          TOML

      - name: Run holbuild
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          holbuild --holdir "$HOLDIR" -j"$(nproc)" build --skip-checkpoints --skip-goalfrag

      - name: Verify no successful-build checkpoints remain
        run: |
          if find .holbuild/checkpoints \( -name '*.save' -o -name '*.save.ok' \) 2>/dev/null | grep -q .; then
            echo "checkpoint files remained after holbuild run" >&2
            find .holbuild/checkpoints \( -name '*.save' -o -name '*.save.ok' \) 2>/dev/null | head -50 >&2
            exit 1
          fi
