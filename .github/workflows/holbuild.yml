name: holbuild

on:
  workflow_dispatch:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  HOLBUILD_REPO: https://github.com/charles-cooper/holbuild.git
  HOLBUILD_REF: b534d283ab4817b77789a6b23399bdd3973e1403

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read HOL4 pin from holproject.toml
        id: hol4-pin
        run: |
          hol4_ref="$(python3 - <<'PY'
          import tomllib
          with open("holproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["dependencies"]["hol"]["rev"])
          PY
          )"
          echo "hol4-ref=$hol4_ref" >> "$GITHUB_OUTPUT"

      - name: Clone pinned holbuild
        run: |
          git clone "$HOLBUILD_REPO" "$HOME/holbuild"
          cd "$HOME/holbuild"
          git checkout --detach "$HOLBUILD_REF"

      - uses: ./.github/actions/deps
        id: deps
        with:
          hol4-ref: ${{ steps.hol4-pin.outputs.hol4-ref }}

      - name: Configure holbuild cache
        run: echo "HOLBUILD_CACHE=$HOME/.cache/holbuild" >> "$GITHUB_ENV"

      - name: Restore holbuild action cache
        id: cache-holbuild
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/holbuild
          key: holbuild-v2-${{ runner.os }}-${{ env.HOLBUILD_REF }}-${{ steps.deps.outputs.deps-hash }}
          restore-keys: |
            holbuild-v2-${{ runner.os }}-${{ env.HOLBUILD_REF }}-
            holbuild-v2-${{ runner.os }}-

      - name: Build holbuild
        run: |
          cd "$HOME/holbuild"
          make HOLDIR="$HOLDIR"
          echo "$HOME/holbuild/bin" >> "$GITHUB_PATH"
      
      - name: Build schema-2 HOL toolchain
        run: holbuild buildhol

      - name: Save holbuild action cache after buildhol
        if: steps.cache-holbuild.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/holbuild
          key: holbuild-v2-${{ runner.os }}-${{ env.HOLBUILD_REF }}-${{ steps.deps.outputs.deps-hash }}

      - name: Run holbuild
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          holbuild -j"$(nproc)" build --skip-checkpoints --skip-goalfrag

      - name: Verify no successful-build checkpoints remain
        run: |
          if find .holbuild/checkpoints \( -name '*.save' -o -name '*.save.ok' \) 2>/dev/null | grep -q .; then
            echo "checkpoint files remained after holbuild run" >&2
            find .holbuild/checkpoints \( -name '*.save' -o -name '*.save.ok' \) 2>/dev/null | head -50 >&2
            exit 1
          fi
