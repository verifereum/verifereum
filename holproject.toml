[holbuild]
schema = 2
required_version = "0.6.0"

[project]
name = "verifereum"
version = "0.1.3"

[build]
roots = ["verifereumScript.sml"]
exclude = ["tests/defs/*", "tests/results/*"]
tactic_timeout = 30

[dependencies.hol]
git = "https://github.com/HOL-Theorem-Prover/HOL.git"
rev = "d456022724bd61e57303339e998313b6580c592d"

[dependencies.holexamples]
from = "hol"
path = "."
manifest = "holexamples.manifest.toml"
