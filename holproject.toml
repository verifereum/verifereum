[holbuild]
schema = 1

[project]
name = "verifereum"
version = "prototype"

[build]
members = [
  "verifereumScript.sml",
  "util",
  "spec",
  "prog",
  "examples",
  "tests/vfmTestAuxLib.sig",
  "tests/vfmTestAuxLib.sml",
  "tests/vfmTestDefLib.sig",
  "tests/vfmTestDefLib.sml",
  "tests/vfmTestResultLib.sig",
  "tests/vfmTestResultLib.sml",
  "tests/vfmTestRunScript.sml",
]
roots = ["verifereumScript.sml"]

[dependencies.HOLKeccak]
manifest = "holbuild-shims/keccak.holproject.toml"

[dependencies.HOLCryptoSHA2]
manifest = "holbuild-shims/sha2.holproject.toml"

[dependencies.HOLCryptoRIPEMD]
manifest = "holbuild-shims/ripemd.holproject.toml"

[dependencies.HOLHoareTriple]
manifest = "holbuild-shims/hoare-triple.holproject.toml"
